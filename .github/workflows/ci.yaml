name: Kasio CI Pipeline

on:
  push:
    branches: [ "master" ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'build.gradle'
      - 'gradlew'
      - 'settings.gradle'
      - '.github/workflows/ci.yaml'

  pull_request:
    branches: [ "master" ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'build.gradle'
      - 'gradlew'
      - 'settings.gradle'
      - '.github/workflows/ci.yaml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build and run tests with Gradle
      run: ./gradlew build