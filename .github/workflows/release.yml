name: Kasio Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Verify Version Matches Git Tag
      run: |
        TAG_VERSION=${GITHUB_REF_NAME#v}
        GRADLE_VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
        
        echo "Pushed Git Tag: $TAG_VERSION"
        echo "build.gradle Version: $GRADLE_VERSION"
        
        if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
          echo "❌ ERROR: Version mismatch!"
          echo "You pushed tag v$TAG_VERSION, but build.gradle says $GRADLE_VERSION."
          echo "Please update build.gradle, push the commit, and re-tag."
          exit 1
        fi
        echo "✅ Versions match. Proceeding with release..."

    - name: Build Standalone JAR
      run: ./gradlew fatJar

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        files: app/build/libs/Kasio-*-standalone.jar
        generate_release_notes: true